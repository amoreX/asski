<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ascuwu — Video to ASCII</title>
    <meta name="description" content="Transform videos into ASCII art. Free, private, runs in your browser." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <span class="logo-icon" aria-hidden="true">01</span>
          <span class="logo-text">ascuwu</span>
        </div>
        <p class="tagline">video → ascii</p>
      </header>

      <!-- Upload -->
      <main id="upload-view" class="view active">
        <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="Upload video file">
          <div class="drop-zone-content">
            <div class="drop-icon" aria-hidden="true">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <p class="drop-title">Drop your video here</p>
            <p class="drop-subtitle">or click to browse</p>
            <p class="drop-formats">MP4 / MOV / WebM</p>
          </div>
          <input type="file" id="file-input" accept="video/*" hidden aria-label="Select video file" />
        </div>
      </main>

      <!-- Process -->
      <main id="process-view" class="view">
        <div class="process-layout">
          <div class="preview-side">
            <div class="video-info-card">
              <div class="video-preview-wrapper"><video id="video-preview" muted aria-hidden="true"></video></div>
              <div class="video-meta">
                <p class="video-name" id="video-name">--</p>
                <div class="meta-pills"><span class="pill" id="pill-res">--</span><span class="pill" id="pill-dur">--</span></div>
              </div>
            </div>
            <div class="live-preview-card">
              <div class="live-preview-header">
                <div class="mode-toggle" role="radiogroup" aria-label="Render mode">
                  <button class="mode-btn active" data-mode="overlay" role="radio" aria-checked="true">Overlay</button>
                  <button class="mode-btn" data-mode="replace" role="radio" aria-checked="false">Replace</button>
                </div>
                <button id="btn-refresh-preview" class="btn-icon" aria-label="Refresh preview">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                </button>
              </div>
              <div class="live-preview-canvas-wrapper">
                <canvas id="live-preview-canvas" aria-label="ASCII preview"></canvas>
                <div id="preview-loader" class="preview-loader hidden" role="status"><div class="spinner"></div><span class="loader-text">Generating preview...</span></div>
                <button id="btn-play-preview" class="play-btn" aria-label="Play preview">
                  <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="settings-side">
            <div class="settings-card">
              <h3 class="settings-title">Settings</h3>
              <div class="setting-row">
                <label class="setting-label" for="font-slider">Character Size <span class="setting-value" id="font-value">10px</span></label>
                <input type="range" id="font-slider" min="4" max="24" value="10" step="1" class="slider" />
                <div class="slider-hints"><span>More Detail</span><span>Larger</span></div>
              </div>
              <div class="setting-row">
                <label class="setting-label">Resolution <span class="setting-value" id="cols-value">-- cols</span></label>
                <p class="setting-hint">Auto-matched to source.</p>
              </div>
              <div class="setting-row">
                <label class="setting-label" id="charset-label">Character Set</label>
                <div class="preset-buttons" role="radiogroup" aria-labelledby="charset-label">
                  <button class="preset-btn active" data-preset="binary" role="radio" aria-checked="true">01</button>
                  <button class="preset-btn" data-preset="ascii" role="radio" aria-checked="false">ASCII</button>
                  <button class="preset-btn" data-preset="blocks" role="radio" aria-checked="false">Blocks</button>
                  <button class="preset-btn" data-preset="custom" role="radio" aria-checked="false">Custom</button>
                </div>
                <div class="charset-input-row"><input type="text" id="charset-input" class="text-input" value="01" spellcheck="false" aria-label="Custom character set" /></div>
              </div>
              <div class="setting-row">
                <label class="setting-label" id="color-label">Color Mode</label>
                <div class="preset-buttons" role="radiogroup" aria-labelledby="color-label">
                  <button class="color-mode-btn active" data-mode="original" role="radio" aria-checked="true">Original</button>
                  <button class="color-mode-btn" data-mode="mono" role="radio" aria-checked="false">Mono</button>
                  <button class="color-mode-btn" data-mode="tint" role="radio" aria-checked="false">Tint</button>
                </div>
                <div id="tint-controls" class="tint-row hidden"><input type="color" id="tint-color" class="color-picker" value="#22d3ee" aria-label="Tint color" /><span class="tint-label" id="tint-hex">#22d3ee</span></div>
              </div>
              <div class="setting-row">
                <label class="setting-label" id="bg-label">Background</label>
                <div class="preset-buttons" role="radiogroup" aria-labelledby="bg-label">
                  <button class="bg-btn active" data-bg="#000000" role="radio" aria-checked="true">Black</button>
                  <button class="bg-btn" data-bg="#09090b" role="radio" aria-checked="false">Zinc</button>
                  <button class="bg-btn" data-bg="#ffffff" role="radio" aria-checked="false">White</button>
                  <button class="bg-btn" data-bg="custom" role="radio" aria-checked="false">Pick</button>
                </div>
                <div id="bg-picker-row" class="tint-row hidden"><input type="color" id="bg-color" class="color-picker" value="#000000" aria-label="Background color" /><span class="tint-label" id="bg-hex">#000000</span></div>
              </div>
              <div id="overlay-settings" class="setting-row">
                <label class="setting-label" for="dim-slider">Image Dim <span class="setting-value" id="dim-value">40%</span></label>
                <input type="range" id="dim-slider" min="0" max="80" value="40" step="5" class="slider" />
              </div>
              <div id="boost-setting" class="setting-row">
                <label class="setting-label" for="boost-slider">Character Boost <span class="setting-value" id="boost-value">60</span></label>
                <input type="range" id="boost-slider" min="0" max="150" value="60" step="5" class="slider" />
              </div>
              <div class="setting-row">
                <label class="setting-label" for="weight-slider">Font Weight <span class="setting-value" id="weight-value">400</span></label>
                <input type="range" id="weight-slider" min="100" max="900" value="400" step="100" class="slider" />
              </div>
            </div>
            <div class="actions">
              <button id="btn-back" class="btn btn-ghost"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back</button>
              <button id="btn-convert" class="btn btn-primary">Convert<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
            </div>
          </div>
        </div>
      </main>

      <!-- Progress -->
      <main id="progress-view" class="view">
        <div class="progress-container">
          <div class="progress-visual"><canvas id="progress-canvas" aria-label="Conversion progress"></canvas></div>
          <div class="progress-info">
            <p class="progress-stage" id="progress-stage" aria-live="polite">Preparing...</p>
            <div class="progress-bar-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"><div class="progress-bar-fill" id="progress-fill"></div></div>
            <p class="progress-percent" id="progress-percent">0%</p>
          </div>
        </div>
      </main>

      <!-- Done -->
      <main id="done-view" class="view">
        <div class="done-container">
          <div class="done-icon" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
          <h2 class="done-title">Done</h2>
          <p class="done-subtitle">Your ASCII video is ready.</p>
          <div class="done-actions">
            <button id="btn-download" class="btn btn-primary">Download<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            <button id="btn-another" class="btn btn-ghost">Convert Another</button>
          </div>
        </div>
      </main>
    </div>

    <video id="source-video" style="display:none" muted playsinline></video>
    <canvas id="work-canvas" style="display:none"></canvas>
    <canvas id="sample-canvas" style="display:none"></canvas>
    <script type="importmap">{"imports":{"@ffmpeg/ffmpeg":"https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js","@ffmpeg/util":"https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js"}}</script>
    <script type="module" src="app.js"></script>
  </body>
</html>
